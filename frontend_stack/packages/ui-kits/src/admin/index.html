<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BeOnEdge — Admin Console</title>
<link rel="stylesheet" href="admin.css"/>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel">
const { useState } = React;

const SCREENS = {
  approvals: { title: 'User approvals', crumbs: ['Operations', 'Approvals'], render: () => <ApprovalsScreen/> },
  funds:     { title: 'Fund CMS',       crumbs: ['Products', 'Fund CMS'],   render: () => <FundsScreen/> },
  payments:  { title: 'Payments',       crumbs: ['Money', 'Payments'],      render: () => <PaymentsScreen/> },
  mandates:  { title: 'Mandates',       crumbs: ['Money', 'Mandates'],      render: () => <MandatesScreen/> },
};

function App() {
  const [active, setActive] = useState('approvals');
  const cur = SCREENS[active] || SCREENS.approvals;
  return (
    <div className="adm-app" data-screen-label="Admin Console">
      <AdminSidebar active={active} onChange={(id) => SCREENS[id] && setActive(id)} />
      <main className="adm-main">
        <AdminTopBar title={cur.title} breadcrumbs={cur.crumbs}/>
        {cur.render()}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

const observer = new MutationObserver(() => { if (window.lucide) window.lucide.createIcons(); });
observer.observe(document.body, { childList: true, subtree: true });
setTimeout(() => window.lucide && window.lucide.createIcons(), 100);
</script>
</body>
</html>
