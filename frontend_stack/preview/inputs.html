<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Inputs & Forms</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 22px; background: var(--be-ivory); margin: 0; font-family: var(--be-font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 20px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 12px; color: var(--be-slate); }
  .input { font: 400 14px var(--be-font-sans); padding: 11px 12px; background: var(--be-bone); border: var(--be-border-1); border-radius: 4px; color: var(--be-ink); transition: border-color .2s var(--be-ease); }
  .input:focus { outline: none; border: 1.5px solid var(--be-ink); padding: 10.5px 11.5px; }
  .input.amt { font-feature-settings: 'tnum' 1, 'lnum' 1; font-weight: 500; font-size: 18px; }
  .err { color: var(--be-red); font-size: 11px; margin-top: 2px; }
  .help { color: var(--be-slate); font-size: 11px; margin-top: 2px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="field">
      <label>Full name</label>
      <input class="input" value="Aanya Sharma"/>
    </div>
    <div class="field">
      <label>Email</label>
      <input class="input" value="aanya@example.in"/>
    </div>
    <div class="field">
      <label>Monthly SIP amount</label>
      <input class="input amt" value="₹ 5,000"/>
      <div class="help">Minimum ₹500</div>
    </div>
    <div class="field">
      <label>PAN number</label>
      <input class="input" value="ABCDE1234F" style="border-color: var(--be-red)"/>
      <div class="err">Enter a valid 10-character PAN.</div>
    </div>
  </div>
</body>
</html>
