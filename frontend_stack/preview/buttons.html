<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 22px; background: var(--be-ivory); margin: 0; font-family: var(--be-font-sans); }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .row:last-child { margin-bottom: 0; }
  .lab { width: 80px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--be-slate); }
  .btn { font: 500 14px/1 var(--be-font-sans); padding: 12px 18px; border-radius: var(--be-radius-md); border: 1px solid transparent; cursor: pointer; transition: all .2s var(--be-ease); display: inline-flex; align-items: center; gap: 8px; }
  .primary { background: var(--be-ink); color: var(--be-ivory); }
  .secondary { background: transparent; color: var(--be-ink); border-color: var(--be-border-strong); }
  .gold { background: var(--be-gold); color: var(--be-ivory); }
  .ghost { background: transparent; color: var(--be-ink); border-color: transparent; }
  .danger { background: transparent; color: var(--be-red); border: 1px solid rgba(180,58,46,0.3); }
  .sm { font-size: 12px; padding: 8px 12px; }
  .lg { font-size: 15px; padding: 14px 22px; }
  .disabled { opacity: 0.4; pointer-events: none; }
</style>
</head>
<body>
  <div class="row">
    <div class="lab">Primary</div>
    <button class="btn primary">Start SIP</button>
    <button class="btn gold">Continue</button>
    <button class="btn secondary">View statement</button>
    <button class="btn ghost">Cancel</button>
    <button class="btn danger">Cancel SIP</button>
  </div>
  <div class="row">
    <div class="lab">Sizes</div>
    <button class="btn primary sm">Small</button>
    <button class="btn primary">Default</button>
    <button class="btn primary lg">Large</button>
    <button class="btn primary disabled">Disabled</button>
  </div>
</body>
</html>
