<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type — Tabular Numbers</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 20px; background: var(--be-ivory); margin: 0; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { background: var(--be-bone); border: var(--be-border-1); border-radius: var(--be-radius-md); padding: 18px; box-shadow: var(--be-shadow-1), var(--be-shadow-card-bevel); }
  .lab { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--be-slate); }
  .big { font-family: var(--be-font-sans); font-feature-settings: 'tnum' 1, 'lnum' 1; font-variant-numeric: tabular-nums lining-nums; font-weight: 500; font-size: 36px; letter-spacing: -0.01em; margin-top: 8px; color: var(--be-ink); }
  .delta { font-feature-settings: 'tnum' 1, 'lnum' 1; font-variant-numeric: tabular-nums; font-size: 13px; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; font-feature-settings: 'tnum' 1, 'lnum' 1; font-variant-numeric: tabular-nums; font-size: 13px; }
  th, td { text-align: right; padding: 6px 0; }
  th:first-child, td:first-child { text-align: left; color: var(--be-slate); }
  tr { border-bottom: 1px solid rgba(92,100,112,0.12); }
  tr:last-child { border-bottom: none; }
</style>
</head>
<body>
  <div class="grid">
    <div class="card">
      <div class="lab">Current value</div>
      <div class="big">₹2,48,562</div>
      <div class="delta be-gain">+₹12,840 · +5.45%</div>
    </div>
    <div class="card">
      <table>
        <tr><th>NAV</th><th>Units</th><th>Value</th></tr>
        <tr><td>Apr 28</td><td>1245.6810</td><td>₹2,48,562</td></tr>
        <tr><td>Apr 21</td><td>1240.4022</td><td>₹2,46,124</td></tr>
        <tr><td>Apr 14</td><td>1232.9981</td><td>₹2,42,008</td></tr>
      </table>
    </div>
  </div>
</body>
</html>
