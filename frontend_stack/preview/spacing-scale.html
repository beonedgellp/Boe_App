<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 20px; background: var(--be-ivory); margin: 0; }
  .row { display: flex; align-items: center; gap: 12px; padding: 6px 0; border-bottom: 1px solid rgba(92,100,112,0.10); }
  .row:last-child { border-bottom: none; }
  .name { width: 90px; font-family: var(--be-font-mono); font-size: 11px; color: var(--be-slate); }
  .px { width: 56px; font-family: var(--be-font-mono); font-size: 11px; color: var(--be-ink); }
  .bar { height: 12px; background: var(--be-ink); border-radius: 2px; }
</style>
</head>
<body>
  <div class="row"><div class="name">space-1</div><div class="px">4px</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="name">space-2</div><div class="px">8px</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="name">space-3</div><div class="px">12px</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="name">space-4</div><div class="px">16px</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="name">space-5</div><div class="px">20px</div><div class="bar" style="width:20px"></div></div>
  <div class="row"><div class="name">space-6</div><div class="px">24px</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="name">space-8</div><div class="px">32px</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="name">space-10</div><div class="px">40px</div><div class="bar" style="width:40px"></div></div>
  <div class="row"><div class="name">space-14</div><div class="px">56px</div><div class="bar" style="width:56px"></div></div>
  <div class="row"><div class="name">space-20</div><div class="px">80px</div><div class="bar" style="width:80px"></div></div>
</body>
</html>
