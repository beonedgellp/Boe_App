<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 24px; background: var(--be-ivory); margin: 0; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; align-items: end; }
  .item { text-align: center; }
  .box { width: 100%; height: 64px; background: var(--be-bone); border: var(--be-border-1); box-shadow: var(--be-shadow-1); }
  .name { font-family: var(--be-font-mono); font-size: 11px; color: var(--be-slate); margin-top: 8px; }
  .use { font-size: 11px; color: var(--be-ink); margin-top: 2px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:2px"></div><div class="name">2px</div><div class="use">tags</div></div>
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="name">4px</div><div class="use">inputs, badges</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="name">8px</div><div class="use">buttons, cards</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="name">12px</div><div class="use">modals, sheets</div></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><div class="name">999px</div><div class="use">state badges, avatars</div></div>
  </div>
</body>
</html>
