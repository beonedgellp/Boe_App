<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Colors — Financial Signal</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 20px; background: var(--be-ivory); margin: 0; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .row { border: var(--be-border-1); border-radius: var(--be-radius-md); background: var(--be-bone); overflow: hidden; }
  .chip { height: 72px; display: flex; align-items: flex-end; padding: 10px 12px; color: white; font-family: var(--be-font-sans); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; }
  .meta { padding: 10px 12px; display:flex; justify-content: space-between; align-items: baseline; }
  .name { font-size: 13px; font-weight: 500; }
  .hex { font-family: var(--be-font-mono); font-size: 11px; color: var(--be-slate); }
  .ex { padding: 8px 12px 12px; font-feature-settings: 'tnum' 1, 'lnum' 1; font-size: 14px; font-weight: 500; }
</style>
</head>
<body>
  <div class="grid">
    <div class="row">
      <div class="chip" style="background:#1F7A4D">Gain</div>
      <div class="meta"><span class="name">Signal Green</span><span class="hex">#1F7A4D</span></div>
      <div class="ex be-gain">+12.4% · ₹1,24,800</div>
    </div>
    <div class="row">
      <div class="chip" style="background:#B43A2E">Loss</div>
      <div class="meta"><span class="name">Signal Red</span><span class="hex">#B43A2E</span></div>
      <div class="ex be-loss">−3.1% · −₹4,200</div>
    </div>
    <div class="row">
      <div class="chip" style="background:#A8741C">Pending</div>
      <div class="meta"><span class="name">Caution Amber</span><span class="hex">#A8741C</span></div>
      <div class="ex be-pending">KYC pending review</div>
    </div>
  </div>
</body>
</html>
