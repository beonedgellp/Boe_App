<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Chart House Style</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 18px 22px; background: var(--be-ivory); margin: 0; font-family: var(--be-font-sans); }
  .card { background: var(--be-bone); border: var(--be-border-1); border-radius: var(--be-radius-md); padding: 16px 18px; box-shadow: var(--be-shadow-1), var(--be-shadow-card-bevel); }
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .name { font-family: var(--be-font-serif); font-weight: 600; font-size: 16px; }
  .src { font-size: 11px; color: var(--be-slate); font-family: var(--be-font-mono); }
  .legend { display: flex; gap: 14px; margin-top: 8px; font-size: 11px; color: var(--be-slate); }
  .leg { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 14px; height: 2px; }
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="name">BeOnEdge Growth Fund · 5Y</div>
      <div class="src">Admin published · 28 Apr 2026</div>
    </div>
    <svg viewBox="0 0 600 160" width="100%" height="160">
      <!-- y rule -->
      <line x1="0" y1="40" x2="600" y2="40" stroke="#5C6470" stroke-opacity="0.15"/>
      <line x1="0" y1="80" x2="600" y2="80" stroke="#5C6470" stroke-opacity="0.15"/>
      <line x1="0" y1="120" x2="600" y2="120" stroke="#5C6470" stroke-opacity="0.15"/>
      <!-- drawdown band -->
      <path d="M 0 110 L 60 105 L 120 118 L 180 130 L 240 122 L 300 100 L 360 90 L 420 110 L 480 95 L 540 80 L 600 70 L 600 160 L 0 160 Z" fill="#B43A2E" fill-opacity="0.08"/>
      <!-- benchmark dashed -->
      <polyline fill="none" stroke="#5C6470" stroke-width="1" stroke-dasharray="4 4" points="0,120 60,116 120,124 180,134 240,128 300,108 360,96 420,114 480,98 540,84 600,72"/>
      <!-- main line -->
      <polyline fill="none" stroke="#0E1116" stroke-width="1.5" stroke-linejoin="round" points="0,118 60,112 120,124 180,134 240,124 300,98 360,86 420,108 480,90 540,72 600,58"/>
      <!-- y axis right -->
      <text x="595" y="44" text-anchor="end" font-family="Inter" font-size="10" fill="#5C6470">200</text>
      <text x="595" y="84" text-anchor="end" font-family="Inter" font-size="10" fill="#5C6470">150</text>
      <text x="595" y="124" text-anchor="end" font-family="Inter" font-size="10" fill="#5C6470">100</text>
      <!-- x ticks -->
      <text x="0" y="155" font-family="Inter" font-size="10" fill="#5C6470">2021</text>
      <text x="150" y="155" font-family="Inter" font-size="10" fill="#5C6470">2022</text>
      <text x="300" y="155" font-family="Inter" font-size="10" fill="#5C6470">2023</text>
      <text x="450" y="155" font-family="Inter" font-size="10" fill="#5C6470">2024</text>
      <text x="580" y="155" font-family="Inter" font-size="10" fill="#5C6470" text-anchor="end">2025</text>
    </svg>
    <div class="legend">
      <div class="leg"><span class="swatch" style="background:#0E1116"></span>Growth Fund</div>
      <div class="leg"><span class="swatch" style="background:#5C6470;border-top:1px dashed;height:0;border-style:dashed;border-width:0 0 1px 0;"></span>Nifty 50</div>
      <div class="leg"><span class="swatch" style="background:#B43A2E;opacity:.4"></span>Drawdown band</div>
    </div>
  </div>
</body>
</html>
