<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Allocation Ring</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 18px; background: var(--be-ivory); margin: 0; font-family: var(--be-font-sans); }
  .card { background: var(--be-bone); border: var(--be-border-1); border-radius: var(--be-radius-md); padding: 18px; box-shadow: var(--be-shadow-1), var(--be-shadow-card-bevel); display: grid; grid-template-columns: 140px 1fr; gap: 22px; align-items: center; }
  .lab { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--be-slate); }
  .head { font-family: var(--be-font-serif); font-weight: 600; font-size: 18px; margin-top: 4px; }
  .legend { margin-top: 10px; }
  .row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(92,100,112,0.10); font-size: 13px; }
  .row:last-child { border-bottom: none; }
  .name { display: flex; align-items: center; gap: 8px; color: var(--be-ink); }
  .swatch { width: 10px; height: 10px; border-radius: 2px; }
  .pct { font-feature-settings: 'tnum' 1, 'lnum' 1; font-variant-numeric: tabular-nums; color: var(--be-ink); font-weight: 500; }
</style>
</head>
<body>
  <div class="card">
    <svg viewBox="0 0 100 100" width="140" height="140">
      <!-- ring: 95 / 5 with gap -->
      <circle cx="50" cy="50" r="40" fill="none" stroke="#EFE9DB" stroke-width="12"/>
      <circle cx="50" cy="50" r="40" fill="none" stroke="#0E1116" stroke-width="12"
              stroke-dasharray="237 251" stroke-dashoffset="62" transform="rotate(-90 50 50)"/>
      <circle cx="50" cy="50" r="40" fill="none" stroke="#B5894A" stroke-width="12"
              stroke-dasharray="11 251" stroke-dashoffset="-180" transform="rotate(-90 50 50)"/>
      <text x="50" y="50" text-anchor="middle" font-family="Source Serif 4, Georgia, serif" font-weight="600" font-size="14" fill="#0E1116">95%</text>
      <text x="50" y="62" text-anchor="middle" font-family="Inter" font-size="7" fill="#5C6470">EQUITY</text>
    </svg>
    <div>
      <div class="lab">Asset Allocation</div>
      <div class="head">BeOnEdge Growth Fund</div>
      <div class="legend">
        <div class="row"><span class="name"><span class="swatch" style="background:#0E1116"></span>Equity</span><span class="pct">95.0%</span></div>
        <div class="row"><span class="name"><span class="swatch" style="background:#B5894A"></span>Cash & equivalents</span><span class="pct">5.0%</span></div>
      </div>
    </div>
  </div>
</body>
</html>
