<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Badges & States</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 24px; background: var(--be-ivory); margin: 0; font-family: var(--be-font-sans); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .row:last-child { margin-bottom: 0; }
  .lab { width: 92px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--be-slate); }
  .badge { font: 500 10px/1 var(--be-font-sans); letter-spacing: 0.12em; text-transform: uppercase; padding: 5px 10px; border-radius: 999px; display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .b-active { background: var(--be-green-soft); color: var(--be-green); }
  .b-active .dot { background: var(--be-green); }
  .b-paused { background: var(--be-amber-soft); color: var(--be-amber); }
  .b-paused .dot { background: var(--be-amber); }
  .b-failed { background: var(--be-red-soft); color: var(--be-red); }
  .b-failed .dot { background: var(--be-red); }
  .b-neutral { background: rgba(92,100,112,0.12); color: var(--be-slate); }
  .b-neutral .dot { background: var(--be-slate); }
  .b-gold { background: var(--be-gold-soft); color: var(--be-gold-2); }
  .chip { font-size: 12px; padding: 4px 10px; border-radius: 4px; background: var(--be-bone); border: var(--be-border-1); color: var(--be-ink); }
</style>
</head>
<body>
  <div class="row">
    <div class="lab">Mandate</div>
    <span class="badge b-active"><span class="dot"></span>Active</span>
    <span class="badge b-paused"><span class="dot"></span>Paused</span>
    <span class="badge b-failed"><span class="dot"></span>Revoked</span>
    <span class="badge b-neutral"><span class="dot"></span>Pending auth</span>
  </div>
  <div class="row">
    <div class="lab">Payment</div>
    <span class="badge b-active"><span class="dot"></span>Success</span>
    <span class="badge b-paused"><span class="dot"></span>Pending</span>
    <span class="badge b-failed"><span class="dot"></span>Failed</span>
    <span class="badge b-neutral"><span class="dot"></span>Reconciled</span>
  </div>
  <div class="row">
    <div class="lab">Tags</div>
    <span class="chip">Equity 95%</span>
    <span class="chip">Cash 5%</span>
    <span class="badge b-gold">Coming soon</span>
  </div>
</body>
</html>
