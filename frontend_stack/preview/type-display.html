<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 24px; background: var(--be-ivory); margin: 0; }
  .row { border-bottom: var(--be-border-1); padding: 14px 0; display: grid; grid-template-columns: 100px 1fr; gap: 16px; align-items: baseline; }
  .row:last-child { border-bottom: none; }
  .label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--be-slate); padding-top: 6px; }
  .spec { font-family: var(--be-font-mono); font-size: 11px; color: var(--be-slate); }
</style>
</head>
<body>
  <div class="row">
    <div class="label">H1 · Hero</div>
    <div>
      <div class="be-h1" style="font-size:48px;">Build wealth, deliberately.</div>
      <div class="spec">Source Serif 4 · 600 · 48px · −0.02em</div>
    </div>
  </div>
  <div class="row">
    <div class="label">H2 · Section</div>
    <div>
      <div class="be-h2" style="font-size:32px;">BeOnEdge Growth Fund</div>
      <div class="spec">Source Serif 4 · 600 · 32px · −0.01em</div>
    </div>
  </div>
  <div class="row">
    <div class="label">H3 · Card</div>
    <div>
      <div class="be-h3">Total invested</div>
      <div class="spec">Source Serif 4 · 600 · 28px</div>
    </div>
  </div>
</body>
</html>
