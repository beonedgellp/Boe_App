<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Logo & Brand Mark</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 0; background: var(--be-ivory); margin: 0; font-family: var(--be-font-sans); display: grid; grid-template-columns: 1fr 1fr; min-height: 220px; }
  .panel { display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding: 28px 32px; gap: 14px; }
  .light { background: var(--be-ivory); }
  .dark { background: var(--be-ink); color: var(--be-ivory); }
  .lab { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--be-slate); }
  .dark .lab { color: rgba(246,241,231,0.5); }
  img { display: block; }
  .row { display: flex; align-items: center; gap: 18px; }
</style>
</head>
<body>
  <div class="panel light">
    <div class="lab">On Ivory</div>
    <div class="row">
      <img src="../assets/logo.svg" width="180" alt="BeOnEdge"/>
      <img src="../assets/logo-mark.svg" width="44" alt="BeOnEdge mark"/>
    </div>
  </div>
  <div class="panel dark">
    <div class="lab">On Ink</div>
    <div class="row">
      <img src="../assets/logo-on-dark.svg" width="180" alt="BeOnEdge"/>
      <img src="../assets/logo-mark.svg" width="44" alt="BeOnEdge mark"/>
    </div>
  </div>
</body>
</html>
