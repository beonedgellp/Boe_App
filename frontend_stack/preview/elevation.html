<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Shadows & Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 28px; background: var(--be-ivory); margin: 0; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .box { background: var(--be-bone); border: var(--be-border-1); border-radius: var(--be-radius-md); padding: 22px 20px; }
  .lab { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--be-slate); }
  .name { font-family: var(--be-font-mono); font-size: 12px; color: var(--be-ink); margin-top: 6px; }
  .desc { font-size: 12px; color: var(--be-slate); margin-top: 6px; }
  .e1 { box-shadow: var(--be-shadow-1), var(--be-shadow-card-bevel); }
  .e2 { box-shadow: var(--be-shadow-2); }
</style>
</head>
<body>
  <div class="grid">
    <div class="box e1">
      <div class="lab">Elevation 1</div>
      <div class="name">shadow-1 + bevel</div>
      <div class="desc">Cards, list rows. Tight, near-flat. Inset highlight reads as "paper".</div>
    </div>
    <div class="box e2">
      <div class="lab">Elevation 2</div>
      <div class="name">shadow-2</div>
      <div class="desc">Modals, popovers, bottom sheets. Long-throw blur is banned.</div>
    </div>
  </div>
</body>
</html>
