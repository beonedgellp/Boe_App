<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  body { padding: 24px; background: var(--be-ivory); margin: 0; font-family: var(--be-font-sans); }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 14px 6px; background: var(--be-bone); border: var(--be-border-1); border-radius: var(--be-radius-md); }
  .ic .name { font-size: 10px; color: var(--be-slate); font-family: var(--be-font-mono); }
  .ic svg { color: var(--be-ink); }
  .note { margin-top: 14px; font-size: 12px; color: var(--be-slate); }
</style>
</head>
<body>
  <div class="grid">
    <div class="ic"><i data-lucide="home"></i><span class="name">home</span></div>
    <div class="ic"><i data-lucide="compass"></i><span class="name">compass</span></div>
    <div class="ic"><i data-lucide="line-chart"></i><span class="name">line-chart</span></div>
    <div class="ic"><i data-lucide="receipt"></i><span class="name">receipt</span></div>
    <div class="ic"><i data-lucide="user"></i><span class="name">user</span></div>
    <div class="ic"><i data-lucide="shield-check"></i><span class="name">shield-check</span></div>
    <div class="ic"><i data-lucide="trending-up"></i><span class="name">trending-up</span></div>
    <div class="ic"><i data-lucide="trending-down"></i><span class="name">trending-down</span></div>
    <div class="ic"><i data-lucide="search"></i><span class="name">search</span></div>
    <div class="ic"><i data-lucide="bell"></i><span class="name">bell</span></div>
    <div class="ic"><i data-lucide="settings"></i><span class="name">settings</span></div>
    <div class="ic"><i data-lucide="file-text"></i><span class="name">file-text</span></div>
    <div class="ic"><i data-lucide="calendar"></i><span class="name">calendar</span></div>
    <div class="ic"><i data-lucide="credit-card"></i><span class="name">credit-card</span></div>
    <div class="ic"><i data-lucide="repeat"></i><span class="name">repeat</span></div>
    <div class="ic"><i data-lucide="lock"></i><span class="name">lock</span></div>
  </div>
  <div class="note">Lucide · 1.5px stroke · 24px viewBox · stroke-only · color inherits currentColor.</div>
  <script>lucide.createIcons();</script>
</body>
</html>
