<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Colors — Core</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 20px; background: var(--be-ivory); margin: 0; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { border: var(--be-border-1); border-radius: var(--be-radius-md); overflow: hidden; background: var(--be-bone); }
  .chip { height: 84px; }
  .meta { padding: 10px 12px; }
  .name { font-size: 13px; font-weight: 500; color: var(--be-ink); }
  .hex { font-size: 11px; color: var(--be-slate); font-family: var(--be-font-mono); margin-top: 2px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#0E1116"></div><div class="meta"><div class="name">Ink</div><div class="hex">#0E1116</div></div></div>
    <div class="sw"><div class="chip" style="background:#F6F1E7"></div><div class="meta"><div class="name">Ivory</div><div class="hex">#F6F1E7</div></div></div>
    <div class="sw"><div class="chip" style="background:#FFFCF6;border-bottom:1px solid var(--be-border)"></div><div class="meta"><div class="name">Bone</div><div class="hex">#FFFCF6</div></div></div>
    <div class="sw"><div class="chip" style="background:#5C6470"></div><div class="meta"><div class="name">Slate</div><div class="hex">#5C6470</div></div></div>
    <div class="sw"><div class="chip" style="background:#B5894A"></div><div class="meta"><div class="name">Gold</div><div class="hex">#B5894A</div></div></div>
  </div>
</body>
</html>
