<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Card Anatomy</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 22px; background: var(--be-ivory); margin: 0; font-family: var(--be-font-sans); }
  .card { background: var(--be-bone); border: var(--be-border-1); border-radius: var(--be-radius-md); padding: 22px 22px; box-shadow: var(--be-shadow-1), var(--be-shadow-card-bevel); }
  .eye { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--be-slate); }
  .head { font-family: var(--be-font-serif); font-weight: 600; font-size: 22px; line-height: 1.2; margin-top: 6px; color: var(--be-ink); }
  .body { font-size: 14px; color: var(--be-slate); margin-top: 8px; line-height: 1.6; }
  .foot { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; padding-top: 14px; border-top: 1px solid rgba(92,100,112,0.12); }
  .src { font-size: 11px; color: var(--be-slate); font-family: var(--be-font-mono); }
  .lnk { font-size: 13px; color: var(--be-ink); text-decoration: underline; text-decoration-color: rgba(92,100,112,0.4); text-underline-offset: 3px; }
</style>
</head>
<body>
  <div class="card">
    <div class="eye">Investment Philosophy</div>
    <div class="head">Patience over noise.</div>
    <div class="body">BeOnEdge invests with a multi-year horizon. We avoid hype, decline tips, and publish what we hold.</div>
    <div class="foot">
      <span class="src">As of 28 Apr 2026</span>
      <a class="lnk" href="#">Read methodology →</a>
    </div>
  </div>
</body>
</html>
