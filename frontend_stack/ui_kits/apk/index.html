<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BeOnEdge — Client APK</title>
<link rel="stylesheet" href="apk.css"/>
<style>
  /* Phone bezel for showcasing screens */
  .apk-bezel {
    width: 412px; height: 844px;
    background: #1A1F27;
    border-radius: 38px;
    padding: 12px;
    box-shadow: 0 30px 80px rgba(14,17,22,0.30);
    position: relative;
  }
  .apk-bezel::before {
    content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    width: 96px; height: 22px; background: #0E1116; border-radius: 999px;
    z-index: 10;
  }
  .apk-bezel-screen {
    width: 100%; height: 100%; border-radius: 28px; overflow: hidden;
    background: var(--be-ivory);
    display: flex; flex-direction: column;
    position: relative;
  }
  .apk-bezel-status {
    height: 36px; flex: 0 0 36px; display: flex; justify-content: space-between; align-items: flex-end;
    padding: 0 22px 6px;
    font-size: 13px; font-weight: 600; color: var(--be-ink);
    font-feature-settings: 'tnum' 1, 'lnum' 1;
  }
  .apk-bezel-body { flex: 1; overflow-y: auto; }
  .apk-bezel-body > .apk-screen, .apk-bezel-body > .apk-no-pad { min-height: 100%; }
  .apk-bezel-body .apk-action-bar { position: sticky; bottom: 0; }
</style>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

function Phone({ label, children }) {
  return (
    <div className="apk-frame-wrap">
      <div className="apk-bezel">
        <div className="apk-bezel-screen">
          <div className="apk-bezel-status">
            <span>9:30</span>
            <span style={{display:'flex',gap:6,alignItems:'center'}}>
              <i data-lucide="signal" style={{width:14,height:14}}></i>
              <i data-lucide="wifi" style={{width:14,height:14}}></i>
              <i data-lucide="battery-full" style={{width:18,height:18}}></i>
            </span>
          </div>
          <div className="apk-bezel-body">
            {children}
          </div>
        </div>
      </div>
      <div className="apk-frame-label">{label}</div>
    </div>
  );
}

function PhoneApp() {
  const [tab, setTab] = useState('home');
  const [view, setView] = useState('dashboard'); // dashboard | fund | tx | profile | explore
  const [sip, setSip] = useState(false);
  // Sync tab → view
  useEffect(() => {
    if (tab === 'home') setView('dashboard');
    if (tab === 'explore') setView('explore');
    if (tab === 'tx') setView('tx');
    if (tab === 'me') setView('profile');
    if (tab === 'portfolio') setView('dashboard');
  }, [tab]);

  return (
    <Phone label="Interactive · tap fund to drill in">
      {view === 'dashboard' && <ApkDashboard onOpenFund={() => setView('fund')} onTab={setTab} />}
      {view === 'explore' && <ApkExplore onOpenFund={() => setView('fund')} />}
      {view === 'fund' && <ApkFundDetail onBack={() => { setTab('home'); setView('dashboard'); }} onStartSip={() => setSip(true)} onLumpsum={() => setSip(true)} />}
      {view === 'tx' && <ApkTransactions />}
      {view === 'profile' && <ApkProfile onLogout={() => alert('Signed out')} />}
      <ApkBottomNav active={tab} onChange={setTab} />
      <ApkStartSipSheet open={sip} onClose={() => setSip(false)} onConfirm={() => { setSip(false); setTab('tx'); }} />
    </Phone>
  );
}

function App() {
  return (
    <div className="apk-stage" data-screen-label="Client APK">
      <div className="apk-stage-label">BeOnEdge — Client APK · Tap through</div>
      <div className="apk-grid" style={{maxWidth: 1320}}>
        <Phone label="Splash"><ApkSplash /></Phone>
        <Phone label="Login"><ApkLogin onLogin={() => {}} /></Phone>
        <PhoneApp />
        <Phone label="Fund detail">
          <ApkFundDetail onBack={() => {}} onStartSip={() => {}} onLumpsum={() => {}} />
        </Phone>
        <Phone label="Transactions">
          <ApkTransactions />
          <ApkBottomNav active="tx" onChange={() => {}} />
        </Phone>
        <Phone label="Profile">
          <ApkProfile onLogout={() => {}} />
          <ApkBottomNav active="me" onChange={() => {}} />
        </Phone>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

// Re-create lucide icons after each render
const observer = new MutationObserver(() => {
  if (window.lucide) window.lucide.createIcons();
});
observer.observe(document.body, { childList: true, subtree: true });
setTimeout(() => window.lucide && window.lucide.createIcons(), 100);
</script>
</body>
</html>
