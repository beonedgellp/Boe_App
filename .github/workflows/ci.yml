# CI gate for `main` — the enforcement that replaces PR review in this workflow.
# Runs the backend invariant guards + tests and the landing build, so a red
# build means "do not push to origin/main".

name: CI

on:
  push:
    branches: [main, prakash]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend (guards + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend_controller
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # `npm install` (not `npm ci`) until the lockfile is regenerated post-TS migration.
      - run: npm install
      # TypeScript type-check gate.
      - run: npm run typecheck
      # Static authorization-invariant guards (no DB needed).
      - run: npm run authz:admin-rbac
      - run: npm run authz:403
      # Colocated unit tests only (src/**/*.test.ts), run through tsx.
      - run: node --import tsx --test "src/**/*.test.ts"

  landing:
    name: landing (test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_stack/packages/landing_page
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
